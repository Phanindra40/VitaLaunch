<svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="vitaGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"></stop>
      <stop offset="50%" stop-color="#7C3AED"></stop>
      <stop offset="100%" stop-color="#06B6D4"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon Border -->
  <path d="M70 12L116 38V102L70 128L24 102V38L70 12Z" stroke="url(#vitaGradient)" stroke-width="6" fill="none"></path>

  <!-- V Shape -->
  <path d="M46 50L68 96L90 50" stroke="url(#vitaGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"></path>

  <!-- L Shape -->
  <path d="M96 44V92H62" stroke="url(#vitaGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"></path>

  <!-- Rocket -->
  <path d="M82 30C98 38 108 52 112 68C98 64 86 54 78 40L82 30Z" fill="url(#vitaGradient)" filter="url(#glow)"></path>

  <!-- Rocket Trail -->
  <path d="M72 52C60 70 50 88 34 106" stroke="url(#vitaGradient)" stroke-width="5" stroke-linecap="round" opacity="0.9"></path>

  <!-- Spark -->
  <circle cx="118" cy="24" r="3" fill="#FFFFFF"></circle>
  <circle cx="126" cy="16" r="2" fill="#06B6D4"></circle>

</svg>