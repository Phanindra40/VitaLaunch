<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Title -->
    <title>
      VitaLaunch | VitaForge AI Career Ecosystem
    </title>

    <!-- SEO -->
    <meta
      name="description"
      content="Create stunning AI-powered developer portfolios with VitaLaunch, a part of the VitaForge AI career ecosystem. Choose modern templates, customize your design, and launch your professional portfolio in minutes."
    />

    <meta
      name="keywords"
      content="VitaLaunch, developer portfolio, AI portfolio builder, VitaForge, portfolio templates, React portfolio, modern portfolio website, software engineer portfolio"
    />

    <meta name="author" content="VitaForge" />

    <!-- Theme -->
    <meta name="theme-color" content="#020617" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="VitaLaunch"
    />

    <meta
      property="og:description"
      content="Build modern developer portfolios with premium templates and AI-powered customization."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://your-domain.com" />

    <meta
      property="og:image"
      content="https://your-domain.com/og-image.png"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="VitaLaunch"
    />

    <meta
      name="twitter:description"
      content="Create stunning AI-powered portfolios in minutes."
    />

    <meta
      name="twitter:image"
      content="https://your-domain.com/og-image.png"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Performance -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- App -->
    <meta
      name="application-name"
      content="VitaLaunch"
    />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
